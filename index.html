<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>67 bot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    color:white;
}

.card{
    width:100%;
    max-width:520px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
    padding:24px;
}

h1{ font-size:24px; margin-bottom:8px; }

p{
    color:#9ca3af;
    margin-bottom:18px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#d1d5db;
}

textarea,input{
    width:100%;
    background:#0b1220;
    border:1px solid #243041;
    color:white;
    border-radius:14px;
    padding:14px;
    margin-bottom:18px;
    outline:none;
}

textarea{ min-height:120px; resize:vertical; }

button{
    width:100%;
    border:none;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    padding:14px;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
}

.status{
    margin-top:12px;
    font-size:14px;
}

.success{ color:#4ade80; }
.error{ color:#f87171; }

.preview{
    margin-top:18px;
    padding:14px;
    background:#0b1220;
    border-radius:12px;
    border:1px solid #243041;
}

code{
    background:#111827;
    padding:2px 6px;
    border-radius:6px;
}

pre{
    background:#111827;
    padding:10px;
    border-radius:10px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="card">
    <h1>67 bot</h1>
    <p>Send messages to Google Chat</p>

    <label>Message</label>
    <textarea id="message" placeholder="Type your message..."></textarea>

    <label>Image URL (optional)</label>
    <input id="image" placeholder=""/>

    <button onclick="sendMessage()">Send Message</button>

    <div class="status" id="status"></div>

    <div class="preview">
        <strong>Preview</strong>
        <div id="preview"></div>
    </div>
</div>

<!-- your JS file (contains webhook + sendMessage) -->
<script src="script.js"></script>

<!-- markdown preview ONLY (does not affect sending) -->
<script>
const msg = document.getElementById("message");
const preview = document.getElementById("preview");

function renderMarkdown(text){
    return text
        .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\*(.*?)\*/g, "<i>$1</i>");
}

function updatePreview(){
    preview.innerHTML = renderMarkdown(msg.value || "Your message preview...");
}

msg.addEventListener("input", updatePreview);
updatePreview();
</script>

</body>
</html>
