<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>67 bot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    color:white;
}

.card{
    width:100%;
    max-width:520px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
    padding:24px;
}

h1{ font-size:24px; margin-bottom:8px; }

p{
    color:#9ca3af;
    margin-bottom:18px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#d1d5db;
}

/* toolbar */
.toolbar{
    display:flex;
    gap:8px;
    margin-bottom:10px;
}

.toolbar button{
    flex:1;
    padding:8px;
    font-size:12px;
    border-radius:10px;
    background:#1f2937;
    border:1px solid #374151;
    cursor:pointer;
    color:white;
}

textarea,input{
    width:100%;
    background:#0b1220;
    border:1px solid #243041;
    color:white;
    border-radius:14px;
    padding:14px;
    margin-bottom:18px;
    outline:none;
}

textarea{ min-height:140px; resize:vertical; }

button.send{
    width:100%;
    border:none;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    padding:14px;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
}

.preview{
    margin-top:18px;
    padding:14px;
    background:#0b1220;
    border-radius:12px;
    border:1px solid #243041;
}

code{
    background:#111827;
    padding:2px 6px;
    border-radius:6px;
}

pre{
    background:#111827;
    padding:10px;
    border-radius:10px;
    overflow:auto;
}

.status{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">
    <h1>67 bot</h1>
    <p>Markdown editor + Google Chat sender</p>

    <label>Message</label>

    <!-- Markdown buttons -->
    <div class="toolbar">
        <button onclick="wrap('**')">Bold</button>
        <button onclick="wrap('*')">Italic</button>
        <button onclick="wrap('`')">Code</button>
        <button onclick="codeBlock()">Code Block</button>
    </div>

    <textarea id="message" placeholder="Select text then press buttons..."></textarea>

    <label>Image URL (optional)</label>
    <input id="image" placeholder="https://example.com/image.png"/>

    <button class="send" onclick="sendMessage()">Send Message</button>

    <div class="status" id="status"></div>

    <div class="preview">
        <strong>Preview</strong>
        <div id="preview"></div>
    </div>
</div>

<script src="script.js"></script>

<script>
const textarea = document.getElementById("message");
const preview = document.getElementById("preview");

/* --------------------------
   WRAP SELECTED TEXT
--------------------------*/
function wrap(wrapper){
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;

    const text = textarea.value;
    const selected = text.substring(start, end);

    if(!selected){
        // if no selection, insert empty wrapper
        textarea.value =
            text.slice(0, start) +
            wrapper + wrapper +
            text.slice(end);

        textarea.focus();
        textarea.selectionStart = textarea.selectionEnd = start + wrapper.length;
    } else {
        textarea.value =
            text.slice(0, start) +
            wrapper + selected + wrapper +
            text.slice(end);

        textarea.focus();
        textarea.selectionStart = start + wrapper.length;
        textarea.selectionEnd = end + wrapper.length;
    }

    updatePreview();
}

/* --------------------------
   CODE BLOCK BUTTON
--------------------------*/
function codeBlock(){
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;

    const text = textarea.value;
    const selected = text.substring(start, end);

    const block = "```\n" + (selected || "") + "\n```";

    textarea.value =
        text.slice(0, start) +
        block +
        text.slice(end);

    updatePreview();
}

/* --------------------------
   PREVIEW (Markdown render)
--------------------------*/
function renderMarkdown(text){
    return text
        .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\*(.*?)\*/g, "<i>$1</i>");
}

function updatePreview(){
    preview.innerHTML = renderMarkdown(
        textarea.value || "Your preview..."
    );
}

textarea.addEventListener("input", updatePreview);
updatePreview();
</script>

</body>
</html>
