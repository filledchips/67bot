<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>67 bot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    color:white;
}

.card{
    width:100%;
    max-width:520px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

h1{ font-size:24px; margin-bottom:8px; }

p{
    color:#9ca3af;
    margin-bottom:18px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#d1d5db;
}

.toolbar{
    display:flex;
    gap:8px;
    margin-bottom:10px;
}

.toolbar button{
    flex:1;
    padding:8px;
    font-size:12px;
    border-radius:10px;
    background:#1f2937;
    border:1px solid #374151;
    cursor:pointer;
    color:white;
}

input,
textarea{
    width:100%;
    background:#0b1220;
    border:1px solid #243041;
    color:white;
    border-radius:14px;
    padding:14px;
    outline:none;
    margin-bottom:18px;
}

textarea{
    resize:vertical;
    min-height:120px;
}

button.send{
    width:100%;
    border:none;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    padding:14px;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

.preview{
    margin-top:22px;
    padding:16px;
    border-radius:16px;
    background:#0b1220;
    border:1px solid #243041;
}

.preview img{
    width:100%;
    border-radius:12px;
    margin-top:12px;
}

.status{
    margin-top:14px;
    font-size:14px;
}

.success{ color:#4ade80; }

/* Markdown preview */
pre{
    background:#000;
    padding:10px;
    border-radius:10px;
    overflow:auto;
}

code{
    background:#111;
    padding:2px 5px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="card">
    <h1>67 bot</h1>
    <p>Send formatted messages + images to Google Chat</p>

    <label>Message</label>

    <div class="toolbar">
        <button type="button" onclick="wrapText('*')">Bold</button>
        <button type="button" onclick="wrapText('_')">Italic</button>
        <button type="button" onclick="wrapText('`')">Code</button>
        <button type="button" onclick="insertCodeBlock()">Code Block</button>
    </div>

    <textarea id="message" placeholder="Type your message..."></textarea>

    <label>Image URL (optional)</label>
    <input type="text" id="image" placeholder="https://example.com/image.png" />

    <button class="send" onclick="sendMessage()">Send Message</button>

    <div class="status" id="status"></div>

    <div class="preview">
        <strong>Preview</strong>
        <p id="previewText" style="margin-top:10px;color:#d1d5db;"></p>
        <img id="previewImage" style="display:none;" />
    </div>
</div>

<script src="script.js"></script>

<script>
const textarea = document.getElementById("message");
const previewText = document.getElementById("previewText");
const imageInput = document.getElementById("image");
const previewImage = document.getElementById("previewImage");
const status = document.getElementById("status");

function wrapText(wrapper) {
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;

    const text = textarea.value;
    const selected = text.substring(start, end);

    textarea.value =
        text.slice(0, start) +
        wrapper + selected + wrapper +
        text.slice(end);

    updatePreview();
}

function insertCodeBlock() {
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;

    const text = textarea.value;
    const selected = text.substring(start, end);

    textarea.value =
        text.slice(0, start) +
        "```\n" + selected + "\n```" +
        text.slice(end);

    updatePreview();
}

/* Markdown renderer */
function renderMarkdown(text) {
    return text
        .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*([^*]+)\*/g, "<b>$1</b>")
        .replace(/_([^_]+)_/g, "<i>$1</i>");
}

function updatePreview() {
    previewText.innerHTML = renderMarkdown(
        textarea.value || "Your message preview..."
    );

    if (imageInput.value.trim()) {
        previewImage.style.display = "block";
        previewImage.src = imageInput.value;
    } else {
        previewImage.style.display = "none";
    }
}

textarea.addEventListener("input", updatePreview);
imageInput.addEventListener("input", updatePreview);

updatePreview();
</script>

</body>
</html>
